# Config for mapping from the bag at ~/semantic_map_ws/bag/
# Topics produced by the helper nodes launched in bag.launch.py
depth_image_topic: /camera/depth_from_lidar
camera_pose_topic: /camera/pose_from_odom
mask_group_topic:  /mask_group_bag
frame_id: map
visualize_with_zero_center: false

beyesian_movement_decrement: 0.1
beyesian_movement_distance_threshold: 0.1
beyesian_movement_increment: 0.2
beyesian_movement_probability_threshold: 0.5
detection_probability: 0.6

if_consider_depth_noise: true
if_out_evaluation_format: false
if_output_freespace: false
if_use_independent_filter: true

match_score_threshold: 0.6
max_obersevation_lost_time: 10
nb_ptc_num_per_point: 1
noise_number: 0.6
occupancy_threshold: 0.1

depth_noise_model_first_order: 0.01
depth_noise_model_zero_order: 0.2

forgetting_rate: 0.5
max_forget_count: 3
id_transition_probability: 0.2
